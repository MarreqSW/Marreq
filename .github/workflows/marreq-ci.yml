name: Marreq CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: coverage-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Set up Node.js (for stylelint)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install stylelint dependencies
        run: npm install --no-save stylelint stylelint-config-standard

      - name: Stylelint CSS files
        run: npx stylelint "frontend/static/**/*.css" --config .stylelintrc.json

      - name: Install PurgeCSS
        run: npm install --no-save purgecss

      - name: Check for unused CSS
        run: node .github/workflows/purgecss-ci.mjs

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run JavaScript tests
        run: npm test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  test-and-coverage:
    runs-on: ubuntu-latest
    env:
      # Host port must match docker/docker-compose.yml (5433:5432); diesel/tests run on the runner, not inside the db container.
      DATABASE_URL: postgres://rust:rust@127.0.0.1:5433/marreq
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Ensure CI .env placeholder exists
        run: test -f .env || touch .env

      - name: Start database
        run: docker compose -f docker/docker-compose.yml -f docker/docker-compose.ci.yml up -d db

      - name: Wait for database to be healthy
        env:
          CI_COMPOSE_OVERRIDE_FILE: docker/docker-compose.ci.yml
        run: .github/workflows/wait_for_db.sh

      - name: Set up Rust (stable + llvm-tools)
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Install diesel CLI
        run: cargo install diesel_cli --no-default-features --features postgres

      - name: Initialize database
        run: ./marreq-core/scripts/db_setup.sh

      - name: Build workspace (release)
        run: cargo build --workspace --release

      - name: Generate coverage reports
        run: |
          cargo cov --workspace --cobertura --output-path coverage.xml
          cargo cov --workspace report --html --output-dir coverage_html

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Build coverage summary (Markdown)
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          format: markdown
          output: file

      - name: Publish to Job Summary
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post coverage as PR comment
        if: github.event_name == 'pull_request'
        uses: mshick/add-pr-comment@v2
        with:
          message-path: code-coverage-results.md
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Coverage gate
        run: cargo cov --workspace --no-run --fail-under-lines 70

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage_html
          retention-days: 7
