name: ReqMan CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: coverage-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  qa-pipeline:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://rust:rust@127.0.0.1:5432/reqman
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Start database
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d db

      - name: Wait for database to be healthy
        run: |
          echo "Waiting for PostgreSQL container to stabilize..."
          sleep 5
          
          # Get container ID
          DB_CONTAINER=$(docker compose ps -q db)
          
          # Wait for container to be healthy
          for i in {1..30}; do
            echo "Attempt $i/30: Checking database health..."
            
            # Check if container is running
            if ! docker ps -q --filter "id=$DB_CONTAINER" | grep -q .; then
              echo "Container stopped unexpectedly, showing logs:"
              docker compose logs db
              exit 1
            fi
            
            # Check health status
            HEALTH=$(docker inspect --format='{{.State.Health.Status}}' "$DB_CONTAINER" 2>/dev/null || echo "unknown")
            echo "Health status: $HEALTH"
            
            if [ "$HEALTH" = "healthy" ]; then
              echo "PostgreSQL is healthy and ready!"
              exit 0
            elif [ "$HEALTH" = "starting" ]; then
              echo "PostgreSQL is starting..."
            elif [ "$HEALTH" = "unhealthy" ]; then
              echo "PostgreSQL is unhealthy, showing logs:"
              docker compose logs db --tail 50
              exit 1
            else
              # No healthcheck yet, try pg_isready directly
              if docker compose exec -T db pg_isready -U rust >/dev/null 2>&1; then
                echo "PostgreSQL is ready (via pg_isready)!"
                exit 0
              fi
            fi
            
            sleep 2
          done
          
          echo "Failed to start database after 30 attempts"
          docker compose logs db
          exit 1

      - name: Set up Rust (nightly + llvm-tools + rustfmt)
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: rustfmt, llvm-tools-preview

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Set up Node.js (for stylelint)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install stylelint dependencies
        run: npm install --no-save stylelint stylelint-config-standard

      - name: Stylelint CSS files
        run: npx stylelint "src/html/static/**/*.css" --config .stylelintrc.json

      - name: Run JavaScript tests
        run: npm test

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Initialize database
        run: ./setup_database.sh

      - name: Coverage (run, no report)
        run: cargo cov --workspace --all-features --doctests --no-report

      - name: Coverage (Cobertura XML)
        run: cargo cov report --cobertura --output-path coverage.xml

      - name: Coverage (HTML)
        run: cargo cov report --html --output-dir coverage_html

      - name: Build coverage summary (Markdown)
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          format: markdown
          output: file

      - name: Publish to Job Summary
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post coverage as PR comment
        if: github.event_name == 'pull_request'
        uses: mshick/add-pr-comment@v2
        with:
          message-path: code-coverage-results.md
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Coverage gate
        run: cargo cov --workspace --all-features --doctests --no-run --fail-under-lines 70

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage_html
          retention-days: 7
