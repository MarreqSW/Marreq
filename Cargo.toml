[package]
name = "req_man"
version = "0.1.0"
edition = "2021"
authors = ["Màrius Montón <marius.monton@gmail.com>"]
description = "Requirements management"
license = "GNU General Public License"

[features]
# Enable test helpers for integration tests
test-helpers = []

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
diesel = { version = "2.2", features = ["postgres","chrono", "r2d2"] }
dotenvy = "0.15"
chrono = {version = "0.4", features = ["serde"] }
serde = "1.0"
serde_json = "1.0"
lazy_static = "1.4"
rocket = {version = "0.5",  features = ["json", "secrets"]}
bcrypt = "0.17"
time = "0.3"
xlsxwriter = "0.6"
printpdf = "=0.8"
calamine = "0.31"
anyhow = "1.0"
regex = "1.10"
thiserror = "2"

# [dependencies.rocket_db_pools]
# version = "0.1.0-rc.2"
# features = ["sqlx_postgres"]

[dependencies.rocket_sync_db_pools]
version = "0.1.0"
features = ["diesel_postgres_pool"]

[dependencies.rocket_dyn_templates]
#version = "0.1.0-rc.2"
version = "0.2.0"
features = ["handlebars"]

[dev-dependencies]
handlebars = { version = "4.5", features = ["dir_source"] }
serde_json = "1.0"
