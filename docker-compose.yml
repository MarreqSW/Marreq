version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: reqman
      POSTGRES_USER: rust
      POSTGRES_PASSWORD: rust
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init_complete.sql:/docker-entrypoint-initdb.d/init_complete.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rust -d reqman"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reqman-network

  # ReqMan Application
  reqman:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - ROCKET_DATABASES={my_db={url="postgres://rust:rust@db:5432/reqman",pool_size=10}}
      - ROCKET_SECRET_KEY=8XuiJDYi9m8KbwspBnjctshHtRnhMxTqc6QQGJ7asJE=
      - DATABASE_URL=postgres://rust:rust@db:5432/reqman
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - reqman-network
    volumes:
      - ./templates:/app/templates:ro
      - ./migrations:/app/migrations:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Database Administration Tool
  adminer:
    image: adminer:4.8.1
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - db
    networks:
      - reqman-network
    environment:
      ADMINER_DEFAULT_SERVER: db

volumes:
  pgdata:
    driver: local

networks:
  reqman-network:
    driver: bridge

