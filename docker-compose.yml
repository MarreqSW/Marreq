services:
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: 'rust'
      POSTGRES_PASSWORD: 'rust'
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rust"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 10s

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

volumes:
#   my-db: 
#    driver: local
  pgdata:

