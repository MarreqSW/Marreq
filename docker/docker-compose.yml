services:
  db:
    image: pgvector/pgvector:pg15-trixie
    restart: always
    environment:
      POSTGRES_USER: 'rust'
      POSTGRES_PASSWORD: 'rust'
      POSTGRES_DB: 'marreq'
    volumes:
      - pgdata:/var/lib/postgresql
    # Host 5433 avoids clashing with a local PostgreSQL on 5432. Containers use db:5432.
    ports:
      - '5433:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rust -d marreq"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    # Host 11435 avoids clashing with a local Ollama on 11434. Backend still uses http://ollama:11434.
    ports:
      - '11435:11434'
    volumes:
      - ollama_data:/root/.ollama

  marreq-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MARREQ_BIN: marreq-server
    restart: always
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: 'postgres://rust:rust@db:5432/marreq'
      ROCKET_DATABASES: '{my_db={url="postgres://rust:rust@db:5432/marreq"}}'
      ROCKET_ADDRESS: '0.0.0.0'
      ROCKET_PORT: '8000'
      # Release binary requires a real key; override via .env for non-local deploys.
      ROCKET_SECRET_KEY: ${ROCKET_SECRET_KEY:-UT5jxByH2kV2h9j/620KVP2w5NwZUEGVREFBbIKHVZk=}
      OLLAMA_URL: 'http://ollama:11434'
      MARREQ_DOCKER_SPLIT_BACKEND: '1'
      # Must include the SPA origin so POST /api/* passes CSRF Origin check when header/cookie mismatch.
      CSRF_ALLOWED_ORIGINS: 'http://127.0.0.1:8080,http://localhost:8080,http://127.0.0.1:8000,http://localhost:8000'
    ports:
      # API on host for debugging; web UI is still the SPA on :8080 (GET / here is JSON in api_only).
      - '127.0.0.1:8000:8000'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://127.0.0.1:8000/api/auth/csrf >/dev/null']
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 120s

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    restart: always
    depends_on:
      marreq-server:
        condition: service_healthy
    ports:
      - '8080:80'

  adminer:
    image: adminer
    restart: always
    depends_on:
      - db
    ports:
      - '8081:8080'

  # Run the cloud (SaaS) binary alongside or instead of marreq-server.
  # Start with: docker compose -f docker/docker-compose.yml --profile cloud up -d marreq-cloud
  # Reads cloud-only env vars (MARREQ_SITE_ADMIN_EMAIL, SMTP_*, MARREQ_PUBLIC_BASE_URL …) from ../.env.
  marreq-cloud:
    profiles: ["cloud"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MARREQ_BIN: marreq-cloud
    restart: always
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: 'postgres://rust:rust@db:5432/marreq'
      ROCKET_DATABASES: '{my_db={url="postgres://rust:rust@db:5432/marreq"}}'
      ROCKET_ADDRESS: '0.0.0.0'
      ROCKET_PORT: '8001'
      ROCKET_SECRET_KEY: ${ROCKET_SECRET_KEY:-UT5jxByH2kV2h9j/620KVP2w5NwZUEGVREFBbIKHVZk=}
      OLLAMA_URL: 'http://ollama:11434'
      MARREQ_PUBLIC_BASE_URL: ${MARREQ_PUBLIC_BASE_URL:-http://localhost:8080}
      CSRF_ALLOWED_ORIGINS: 'http://127.0.0.1:8080,http://localhost:8080,http://127.0.0.1:8001,http://localhost:8001'
    ports:
      - '127.0.0.1:8001:8001'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://127.0.0.1:8001/api/auth/csrf >/dev/null']
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 120s

volumes:
  pgdata:
  ollama_data:
