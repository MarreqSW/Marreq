services:
  db:
    image: pgvector/pgvector:pg15-trixie
    restart: always
    environment:
      POSTGRES_USER: 'rust'
      POSTGRES_PASSWORD: 'rust'
      POSTGRES_DB: 'marreq'
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rust -d marreq"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    # For GPU support, uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  marreq:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: 'postgres://rust:rust@db:5432/marreq'
      # TOML format (Rocket does not use JSON for config env vars)
      ROCKET_DATABASES: '{my_db={url="postgres://rust:rust@db:5432/marreq"}}'
      # Listen on all interfaces so the host can reach the app (default 127.0.0.1 is container-only)
      ROCKET_ADDRESS: '0.0.0.0'
      # Semantic search via Ollama (see docs/developer/ollama-setup.md)
      EMBEDDINGS_ENABLED: 'true'
      EMBEDDING_PROVIDER: 'ollama'
      EMBEDDING_MODEL: 'nomic-embed-text'
      OLLAMA_URL: 'http://ollama:11434'
      RAG_ENABLED: 'true'
      RAG_MODEL: 'llama3.2'
      RAG_MAX_TOKENS: '1024'
      RAG_TOP_K: '10'
    ports:
      - '8000:8000'

  adminer:
    image: adminer
    restart: always
    depends_on:
      - db
    ports:
      - 8080:8080

volumes:
  pgdata:
  ollama_data:
