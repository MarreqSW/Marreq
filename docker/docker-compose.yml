services:
  db:
    image: pgvector/pgvector:pg15-trixie
    restart: always
    environment:
      POSTGRES_USER: 'rust'
      POSTGRES_PASSWORD: 'rust'
      POSTGRES_DB: 'marreq'
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rust -d marreq"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: 'postgres://rust:rust@db:5432/marreq'
      ROCKET_DATABASES: '{my_db={url="postgres://rust:rust@db:5432/marreq"}}'
      ROCKET_ADDRESS: '0.0.0.0'
      OLLAMA_URL: 'http://ollama:11434'
      MARREQ_UI_MODE: 'api_only'
      MARREQ_SERVE_STATIC: '0'
    expose:
      - '8000'

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    restart: always
    depends_on:
      - backend
    ports:
      - '8080:80'

  adminer:
    image: adminer
    restart: always
    depends_on:
      - db
    ports:
      - '8081:8080'

volumes:
  pgdata:
  ollama_data:
