# Docker embedded DNS — required when proxy_pass uses a variable so `marreq-server` is re-resolved
# after container recreate (avoids stale upstream IP → connection refused).
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    set $marreq_backend http://marreq-server:8000;

    location /api/ {
        proxy_pass $marreq_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        client_max_body_size 100m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
