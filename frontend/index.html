<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marreq</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css"
      crossorigin="anonymous"
    />
  </head>
  <body class="login-page" data-page="login">
    <main>
      <div id="marreq-spa-root" class="marreq-spa-root">
        <div class="marreq-login">
          <button
            data-theme-toggle
            class="theme-toggle marreq-login__theme-toggle c-theme-toggle"
            type="button"
            aria-label="Toggle dark mode"
            aria-pressed="false"
            title="Toggle dark mode"
          >
            <span
              class="theme-toggle-icon theme-toggle-icon-sun c-theme-toggle__icon c-theme-toggle__icon--sun"
              aria-hidden="true"
              >☀</span
            >
            <span
              class="theme-toggle-icon theme-toggle-icon-moon c-theme-toggle__icon c-theme-toggle__icon--moon"
              aria-hidden="true"
              >🌙</span
            >
          </button>
          <div class="marreq-login__card">
            <header class="marreq-login__header">
              <h1>Welcome to Marreq</h1>
              <p>Please sign in to continue</p>
            </header>

            <form class="marreq-login__form">
              <div class="mb-3">
                <label for="username" class="form-label c-form-label">Username</label>
                <input
                  id="username"
                  name="username"
                  type="text"
                  class="form-control c-form-control"
                  autocomplete="username"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="password" class="form-label c-form-label">Password</label>
                <input
                  id="password"
                  name="password"
                  type="password"
                  class="form-control c-form-control"
                  autocomplete="current-password"
                  required
                />
              </div>

              <button type="submit" class="btn btn-primary w-100">Sign In</button>
            </form>

            <footer class="marreq-login__footer">
              <p>Default credentials: alice / ChangeMe123!</p>
            </footer>
          </div>

          <p>&copy; 2026 Marreq - Requirements Management System</p>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
